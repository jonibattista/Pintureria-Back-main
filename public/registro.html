<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Registro</title>
</head>
<body>
    <script src="registro.js"></script>
    <div class="container mt-5 d-flex justify-content-center">
        <div class="card p-4" style="width: 400px;">
            <h3 class="text-center">Crear Cuenta</h3>   
            <form id="empleadoForm" class="needs-validation" novalidate>
                <div class="mb-3 mt-3">
                    <label for="num" class="form-label">Numero de sucursal:</label>
                    <input type="number" class="form-control" id="num" placeholder="Numero de sucursal" required>
                    <div class="invalid-feedback">Por favor ingrese un nombre.</div>
                </div>
                <div class="mb-3">
                    <label for="pwd" class="form-label">Contraseña:</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Contraseña" name="pswd" required>
                    <div class="invalid-feedback">Por favor ingrese una contraseña.</div>
                </div>
                <a type="submit" class="btn btn-primary" href="inicioSesion.html">Guardar</a>
                <a class="btn btn-primary" href="inicioSesion.html">Cancelar</a>
            </form>
        </div>
    </div>    
</body>
</html>
