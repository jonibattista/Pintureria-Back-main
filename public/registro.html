<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Registro</title>
</head>
<body>
    <div class="container mt-5 d-flex justify-content-center">
        <div class="card p-4" style="width: 400px;">
            <h3 class="text-center">Crear Cuenta</h3>   
            <h3 class="text-center">Iniciar Sesión</h3>   
            <form id="registerForm" action="/allUsuario" method="post" class="needs-validation" novalidate>
                <div class="mb-3 mt-3">
                    <label for="uname" class="form-label">Username:</label>
                    <input type="text" class="form-control" id="uname" placeholder="Username" name="uname" required>
                    <div class="invalid-feedback">Por favor ingrese un nombre de usuario.</div>
                </div>
                <div class="mb-3">
                    <label for="uemail" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Email" name="uemail" required>
                    <div class="invalid-feedback">Por favor ingrese un email valido.</div>
                </div>
                <div class="mb-3">
                    <label for="psw" class="form-label">Password:</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Password" name="psw" required>
                    <div class="invalid-feedback">Por favor ingrese una contraseña.</div>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="remember">
                    <label class="form-check-label"> Remember me</label>
                </div>
                <input type="submit" class="btn btn-primary" ></input>
                <!--<a class="btn btn-primary" >Cancelar</a> -->  
            </form>
        </div>
    </div>  
    <script src="../Usuarios/Usuario.events.js"></script>  
</body>
</html>
