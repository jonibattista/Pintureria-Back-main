<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Sucursales</title>
</head>
<body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="rio_color.png" alt="Logo" style="width:130px; height:auto;" class="rounded-pill">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="suc" href="sucursal.html">Sucursales</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="clien" href="#">Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="emp" href="#">Empleados</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="prov" href="#">Proveedores</a>
                    </li>  
                    <li class="nav-item">
                        <a class="nav-link" id="ven" href="#">Ventas</a>
                    </li> 
                    <li class="nav-item">
                        <a class="nav-link" id="prod" href="#">Productos</a>
                    </li>  
                </ul>
            </div>
        </div>
    </nav>
    
    <h1 style="padding: 6% 1%; margin-top: 3%;">Sucursales</h1>
   
    <div class="btn-group modal-dialog-centered">
        <button id="b_new" type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#formModal">Nueva sucursal</button>
        <button id="b_show" type="button" class="btn btn-primary">Mostrar sucursales</button>
        <button id="b_mod" type="button" class="btn btn-primary">Modificar sucursal</button>
        <button id="b_del" type="button" class="btn btn-primary">Eliminar sucursal</button>
    </div>
    
    <!-- The Modal -->
    <div class="modal fade" id="formModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalLabel">Nueva Sucursal</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="b-new">
                    <form id="sucData" method="post" accept-charset="utf-8">
                        <div class="mb-3">
                            <label for="Direccion" class="form-label">Dirección:</label>
                            <input type="text" name="Direccion" placeholder="Dirección" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="Telefono" class="form-label">Teléfono:</label>
                            <input type="text" name="Telefono" placeholder="Teléfono" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Enviar</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Tabla para mostrar sucursales -->
<div class="container mt-4">
    <h2>Listado de Sucursales</h2>
    <table class="table table-bordered" id="sucursalTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Dirección</th>
                <th>Teléfono</th>
            </tr>
        </thead>
        <tbody>
            <!-- Las filas se agregarán aquí dinámicamente -->
        </tbody>
    </table>
</div>

    <script src="CRUD_Sucursal.js"></script>
</body>
</html>
